<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Pantalla Pública — Huapango Xalapa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root{--negro:#0A0A0A;--verde-oscuro:#1B4332;--verde-medio:#2D6A4F;--verde-claro:#52B788;--dorado:#D4A017;--dorado-claro:#F4C430;--crema:#FFF8E7;--blanco:#FFFFFF;--rojo-vivo:#FF3B30;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--negro);color:var(--blanco);font-family:'DM Sans',sans-serif;}
    body::before{content:'';position:fixed;inset:0;z-index:0;background-image:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(45,106,79,0.35) 0%,transparent 70%),repeating-linear-gradient(60deg,transparent 0px,transparent 60px,rgba(255,255,255,0.012) 60px,rgba(255,255,255,0.012) 61px);pointer-events:none;}

    /* ===== LAYOUT PRINCIPAL =====
       3 filas: topbar | cuerpo | barra inferior */
    .layout{position:relative;z-index:1;display:grid;grid-template-rows:auto 1fr auto;height:100vh;}

    /* ===== TOPBAR ===== */
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 2rem;background:rgba(27,67,50,0.7);border-bottom:2px solid var(--dorado);backdrop-filter:blur(8px);gap:1rem;}
    .topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--dorado);letter-spacing:0.06em;white-space:nowrap;}
    .topbar-logo span{color:var(--crema);font-size:0.85rem;font-family:'DM Sans',sans-serif;font-weight:400;letter-spacing:0;margin-left:0.75rem;}
    .reloj{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--dorado);letter-spacing:0.08em;white-space:nowrap;}

    /* ===== TRÍO EN TURNO (centro del topbar) ===== */
    .trio-wrap{display:flex;align-items:center;gap:0.5rem;background:rgba(212,160,23,0.1);border:1px solid rgba(212,160,23,0.3);padding:0.35rem 1rem;border-radius:999px;}
    .trio-label{font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.4);}
    .trio-nombre{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--dorado-claro);letter-spacing:0.06em;}

    /* ===== CUERPO =====
       2 columnas: izquierda grande (bloque actual + siguientes) | derecha pequeña (info) */
    .cuerpo{display:grid;grid-template-columns:1fr 260px;overflow:hidden;}
    @media(max-width:1100px){.cuerpo{grid-template-columns:1fr;}.sidebar-derecho{display:none;}}

    /* ===== COLUMNA IZQUIERDA ===== */
    .col-izq{padding:1.5rem 2rem 1rem;display:flex;flex-direction:column;gap:1.25rem;overflow:hidden;}

    .etiqueta-seccion{font-size:0.65rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--verde-claro);margin-bottom:0.4rem;display:flex;align-items:center;gap:0.4rem;}

    /* ===== BLOQUE EN CURSO — muy grande para verse en TV ===== */
    .bloque-en-curso{background:linear-gradient(135deg,rgba(45,106,79,0.5),rgba(27,67,50,0.3));border:2px solid var(--dorado);border-radius:20px;padding:1.75rem 2.5rem;position:relative;overflow:hidden;flex:1;}
    .bloque-en-curso::after{content:'';position:absolute;right:-40px;top:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(212,160,23,0.15),transparent 70%);pointer-events:none;}

    .en-vivo{display:inline-flex;align-items:center;gap:0.5rem;background:rgba(255,59,48,0.15);border:1px solid var(--rojo-vivo);padding:0.3rem 0.85rem;border-radius:999px;font-size:0.75rem;font-weight:700;color:var(--rojo-vivo);margin-bottom:0.75rem;letter-spacing:0.08em;}
    .punto-vivo{width:8px;height:8px;background:var(--rojo-vivo);border-radius:50%;animation:parpadear 1s ease infinite;}
    @keyframes parpadear{0%,100%{opacity:1;}50%{opacity:0.1;}}

    /* Nombre del bloque — MUY GRANDE */
    .bloque-nombre-grande{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,7vw,6rem);line-height:1;color:var(--dorado-claro);margin-bottom:0.2rem;letter-spacing:0.04em;}
    .bloque-subtitulo{font-size:clamp(1rem,2vw,1.4rem);color:rgba(255,255,255,0.6);margin-bottom:1.25rem;}

    /* Chips de parejas — GRANDES */
    .parejas-chips{display:flex;flex-wrap:wrap;gap:0.75rem;}
    .pareja-chip{background:var(--dorado);color:var(--negro);font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,4vw,3.5rem);padding:0.2rem 1rem;border-radius:12px;letter-spacing:0.06em;line-height:1.2;animation:chipEntrada 0.4s ease both;}
    @keyframes chipEntrada{from{opacity:0;transform:scale(0.8) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}

    /* ===== SIGUIENTES BLOQUES — 3 tarjetas ===== */
    .siguientes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.85rem;}
    .bloque-siguiente{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:0.9rem 1rem 1rem;display:flex;flex-direction:column;gap:0.5rem;}
    .siguiente-num{font-family:'Bebas Neue',sans-serif;font-size:0.75rem;color:var(--verde-claro);letter-spacing:0.18em;}
    .siguiente-nombre{font-size:0.82rem;font-weight:700;color:var(--crema);line-height:1.3;}
    .siguiente-divisor{height:1px;background:rgba(255,255,255,0.07);}
    .siguiente-parejas-label{font-size:0.62rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.35);}
    .siguiente-parejas{display:flex;flex-wrap:wrap;gap:0.4rem;}
    /* Chips de siguientes — más grandes que antes */
    .siguiente-chip{background:rgba(212,160,23,0.18);border:1.5px solid rgba(212,160,23,0.45);color:var(--dorado-claro);font-family:'Bebas Neue',sans-serif;font-size:1.8rem;padding:0.05rem 0.7rem;border-radius:8px;letter-spacing:0.06em;line-height:1.4;}

    /* ===== SIDEBAR DERECHO — información compacta ===== */
    .sidebar-derecho{border-left:1px solid rgba(255,255,255,0.07);padding:1rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto;background:rgba(0,0,0,0.25);}

    .info-evento{background:rgba(45,106,79,0.2);border:1px solid rgba(82,183,136,0.25);border-radius:12px;padding:1rem;}
    .info-evento-titulo{font-family:'Playfair Display',serif;font-size:0.85rem;color:var(--dorado);margin-bottom:0.6rem;line-height:1.3;}
    .info-fila{display:flex;justify-content:space-between;align-items:center;font-size:0.75rem;padding:0.3rem 0;border-bottom:1px solid rgba(255,255,255,0.06);}
    .info-fila:last-child{border-bottom:none;}
    .info-fila .key{color:rgba(255,255,255,0.45);}
    .info-fila .valor{font-weight:700;color:var(--crema);font-size:0.78rem;}

    /* Categorías */
    .cats-lista{display:flex;flex-direction:column;gap:0.4rem;}
    .cat-fila{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.04);border-radius:6px;padding:0.45rem 0.7rem;font-size:0.72rem;}
    .cat-nombre{color:var(--crema);font-weight:500;}
    .cat-num{font-family:'Bebas Neue',sans-serif;color:var(--dorado);font-size:0.9rem;}

    /* ===== BARRA INFERIOR: TICKER ===== */
    .barra-inferior{background:var(--verde-oscuro);border-top:2px solid var(--dorado);padding:0.5rem 2rem;display:flex;align-items:center;gap:1rem;overflow:hidden;}
    .barra-label{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;color:var(--dorado);letter-spacing:0.1em;white-space:nowrap;padding-right:1rem;border-right:1px solid rgba(212,160,23,0.4);}
    .ticker-wrap{flex:1;overflow:hidden;}
    .ticker{display:inline-flex;white-space:nowrap;animation:ticker 40s linear infinite;font-size:0.82rem;color:rgba(255,255,255,0.7);gap:4rem;}
    @keyframes ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}

    /* Animaciones de transición de bloque */
    .fade-out{animation:fadeOut 0.4s ease forwards;}
    .fade-in{animation:fadeIn 0.5s ease forwards;}
    @keyframes fadeOut{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(-10px);}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    .ornamento{position:fixed;bottom:60px;right:20px;font-size:12rem;opacity:0.03;pointer-events:none;user-select:none;z-index:0;line-height:1;}
  </style>
</head>
<body>

<div class="ornamento">♪</div>

<div class="layout">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-logo">Huapango Xalapa<span>1er Concurso Nacional</span></div>

    <!-- TRÍO EN TURNO — se actualiza automáticamente cada 4 bloques -->
    <div class="trio-wrap">
      <span class="trio-label">Tocando ahora</span>
      <span class="trio-nombre" id="trio-nombre">TRIO 1</span>
    </div>

    <div class="reloj" id="reloj">00:00:00</div>
  </header>

  <!-- CUERPO -->
  <div class="cuerpo">

    <!-- COLUMNA IZQUIERDA -->
    <div class="col-izq">

      <!-- Bloque en curso -->
      <div>
        <div class="etiqueta-seccion">
          <span class="punto-vivo" style="width:6px;height:6px;background:var(--verde-claro);"></span>
          Bailando ahora
        </div>
        <div class="bloque-en-curso" id="bloque-actual">
          <div class="en-vivo"><div class="punto-vivo"></div>EN VIVO</div>
          <div class="bloque-nombre-grande" id="actual-nombre">EN ESPERA</div>
          <div class="bloque-subtitulo" id="actual-subtitulo">El encargado activará el primer bloque en breve</div>
          <div class="etiqueta-seccion" style="margin-bottom:0.6rem;">Parejas en pista</div>
          <div class="parejas-chips" id="actual-chips"></div>
        </div>
      </div>

      <!-- Siguientes bloques -->
      <div>
        <div class="etiqueta-seccion">⏭ Próximos bloques</div>
        <div class="siguientes-grid" id="siguientes-grid"></div>
      </div>

    </div>

    <!-- SIDEBAR DERECHO — información compacta -->
    <div class="sidebar-derecho">
      <div class="info-evento">
        <div class="info-evento-titulo">1er Concurso Nacional de Huapango · Xalapa</div>
        <div class="info-fila"><span class="key">Sede</span><span class="valor">Xalapa, Ver.</span></div>
        <div class="info-fila"><span class="key">Ronda</span><span class="valor" id="info-ronda">—</span></div>
        <div class="info-fila"><span class="key">Parejas</span><span class="valor" id="info-total">—</span></div>
        <div class="info-fila"><span class="key">Confirmadas</span><span class="valor" id="info-confirmadas" style="color:var(--verde-claro)">—</span></div>
      </div>
      <div>
        <div class="etiqueta-seccion">Categorías</div>
        <div class="cats-lista" id="cats-lista"></div>
      </div>
    </div>

  </div>

  <!-- BARRA INFERIOR: TICKER con sponsors -->
  <footer class="barra-inferior">
    <div class="barra-label">AVISOS</div>
    <div class="ticker-wrap"><div class="ticker" id="ticker"></div></div>
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SUPABASE_URL = 'https://uicdxokikzhhqnjcjbyz.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpY2R4b2tpa3poaHFuamNqYnl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NTc5NDksImV4cCI6MjA5NDIzMzk0OX0.GfT1awkKGorrgxMImW2uwxo1wYcnllDb7ONT7A9mpYA';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// =========================================================
//  TRÍOS — cambia los nombres aquí cuando los tengas
//  Rotan automáticamente cada 4 bloques terminados
// =========================================================
var TRIOS = [
  'TRIO 1',   // ← cambia por el nombre real del primer trío
  'TRIO 2',   // ← cambia por el nombre real del segundo trío
  'TRIO 3',   // ← cambia por el nombre real del tercer trío
];

// =========================================================
//  SPONSORS / PATROCINADORES — agrega o quita aquí
//  Aparecen en la barra inferior rotando
// =========================================================
var SPONSORS = [
  'SPONSOR 1',   // ← cambia por el nombre real del patrocinador 1
  'SPONSOR 2',   // ← cambia por el nombre real del patrocinador 2
  'SPONSOR 3',   // ← cambia por el nombre real del patrocinador 3
];

// =========================================================
//  MENSAJES DEL TICKER INFERIOR
//  Aquí van los avisos generales del evento
//  Los sponsors se agregan automáticamente al final
// =========================================================
var MENSAJES_TICKER = [
  '🎶 Recuerda estar atento al número de tu pareja para subir a pista a tiempo.',
  '💃 Los bloques se activarán en orden — estate pendiente de la pantalla.',
  '📵 Por favor mantén el teléfono en silencio durante las presentaciones.',
  '🏆 Los resultados finales se publicarán al terminar cada ronda.',
  '👋 ¡Bienvenidos al 1er Concurso Nacional de Huapango de Xalapa!',
];

// Estado global
var bloqueActivoActual = {nombre:'', subtitulo:'', parejas:[]};
var bloquesSiguientes  = [];
var bloquesTerminados  = 0; // contador de bloques terminados para rotar trío

// =========================================================
//  INICIALIZACIÓN
// =========================================================
window.addEventListener('DOMContentLoaded', async function() {
  iniciarReloj();
  await cargarDatos();
  await cargarStats();
  iniciarTicker();

  // Realtime — pantalla se actualiza sola cuando cambia un bloque
  supabase.channel('pantalla-publica')
    .on('postgres_changes', {event:'UPDATE', schema:'public', table:'bloques'},
      async function() { await cargarDatos(); })
    .subscribe();
});

// =========================================================
//  CARGAR DATOS DE BLOQUES
// =========================================================
async function cargarDatos() {
  var r = await supabase.from('bloques')
    .select('id,nombre,categoria,estilo,ronda,estado,orden,bloque_parejas(pareja_num)')
    .order('orden', {ascending:true});

  if (r.error) { console.error(r.error); return; }

  var data      = r.data || [];
  var enCurso   = data.find(function(b){return b.estado==='en_curso';});
  var pendientes = data.filter(function(b){return b.estado==='pendiente';});

  // Contar terminados para rotar trío
  bloquesTerminados = data.filter(function(b){return b.estado==='terminado';}).length;
  actualizarTrio();

  if (enCurso) {
    var nuevo = {
      nombre:    enCurso.nombre,
      subtitulo: enCurso.categoria + ' · ' + enCurso.estilo + ' — ' + (enCurso.ronda||'').replace(/_/g,' '),
      parejas:   enCurso.bloque_parejas.map(function(bp){return bp.pareja_num;}),
    };
    cambiarBloque(nuevo);
    document.getElementById('info-ronda').textContent = (enCurso.ronda||'').replace(/_/g,' ');

    // -------------------------------------------------------
    //  PRÓXIMOS BLOQUES — solo del grupo activo, en orden:
    //  primera ronda → semifinal → final
    //  Si la ronda siguiente no existe aún, mostrar placeholder
    // -------------------------------------------------------
    var cat    = enCurso.categoria;
    var estilo = enCurso.estilo;
    var rondaActual = enCurso.ronda;

    // Pendientes del mismo grupo
    var pendientesGrupo = pendientes.filter(function(b){
      return b.categoria === cat && b.estilo === estilo;
    });

    // Pendientes de primera ronda del grupo
    var pendientesPrimera = pendientesGrupo.filter(function(b){return b.ronda==='primera_ronda';});
    // Pendientes de semifinal del grupo
    var pendientesSemi    = pendientesGrupo.filter(function(b){return b.ronda==='semifinal';});
    // Pendientes de final del grupo
    var pendientesFinal   = pendientesGrupo.filter(function(b){return b.ronda==='final';});

    // ¿Ya existen bloques de semifinal para este grupo?
    var haySemi  = data.some(function(b){return b.categoria===cat&&b.estilo===estilo&&b.ronda==='semifinal';});
    var hayFinal = data.some(function(b){return b.categoria===cat&&b.estilo===estilo&&b.ronda==='final';});

    // Construir lista de próximos en orden
    bloquesSiguientes = [];

    // Agregar pendientes de primera ronda (máx 3)
    pendientesPrimera.slice(0,3).forEach(function(b,i){
      bloquesSiguientes.push({
        etiqueta: 'Siguiente →',
        nombre:   b.nombre + ' — ' + b.categoria + ' / ' + b.estilo,
        parejas:  b.bloque_parejas.map(function(bp){return bp.pareja_num;}),
        placeholder: false,
      });
    });

    // Si no hay más primera ronda pendiente, agregar semifinal o placeholder
    if (pendientesPrimera.length === 0 || rondaActual === 'primera_ronda') {
      if (pendientesSemi.length > 0) {
        // Mostrar bloques de semifinal reales
        pendientesSemi.slice(0, 3 - bloquesSiguientes.length).forEach(function(b){
          bloquesSiguientes.push({
            etiqueta: '🏅 Semifinal',
            nombre:   b.nombre + ' — ' + b.categoria + ' / ' + b.estilo,
            parejas:  b.bloque_parejas.map(function(bp){return bp.pareja_num;}),
            placeholder: false,
          });
        });
      } else if (!haySemi && pendientesPrimera.length <= 1) {
        // Placeholder de semifinal
        bloquesSiguientes.push({
          etiqueta: '🏅 A continuación',
          nombre:   'Semifinal — ' + cat + ' / ' + estilo,
          parejas:  [],
          placeholder: true,
          placeholderTexto: 'Las parejas se definirán al terminar la primera ronda',
        });
      }
    }

    // Si ya está en semifinal, agregar final o placeholder
    if (rondaActual === 'semifinal') {
      if (pendientesFinal.length > 0) {
        pendientesFinal.forEach(function(b){
          bloquesSiguientes.push({
            etiqueta: '🥇 Final',
            nombre:   b.nombre + ' — ' + b.categoria + ' / ' + b.estilo,
            parejas:  b.bloque_parejas.map(function(bp){return bp.pareja_num;}),
            placeholder: false,
          });
        });
      } else if (!hayFinal) {
        bloquesSiguientes.push({
          etiqueta: '🥇 A continuación',
          nombre:   'Final — ' + cat + ' / ' + estilo,
          parejas:  [],
          placeholder: true,
          placeholderTexto: 'Las 6 finalistas se definirán al terminar la semifinal',
        });
      }
    }

    // Limitar a 3
    bloquesSiguientes = bloquesSiguientes.slice(0,3);

  } else {
    document.getElementById('actual-nombre').textContent    = 'EN ESPERA';
    document.getElementById('actual-subtitulo').textContent = 'El encargado activará el primer bloque en breve';
    document.getElementById('actual-chips').innerHTML       = '';
    document.getElementById('info-ronda').textContent       = '—';
    bloquesSiguientes = [];
  }

  renderizarSiguientes();
}

// =========================================================
//  CARGAR ESTADÍSTICAS DEL SIDEBAR
// =========================================================
async function cargarStats() {
  var r = await supabase.from('parejas').select('confirmado,categoria_nombre');
  if (!r.error && r.data) {
    document.getElementById('info-total').textContent        = r.data.length;
    document.getElementById('info-confirmadas').textContent  = r.data.filter(function(p){return p.confirmado;}).length;
    var conteo = {};
    r.data.filter(function(p){return p.confirmado;}).forEach(function(p){
      conteo[p.categoria_nombre] = (conteo[p.categoria_nombre]||0)+1;
    });
    var lista = document.getElementById('cats-lista');
    lista.innerHTML = Object.entries(conteo).map(function(e){
      return '<div class="cat-fila"><span class="cat-nombre">'+e[0]+'</span><span class="cat-num">'+e[1]+'</span></div>';
    }).join('') || '<div class="cat-fila"><span class="cat-nombre" style="opacity:0.5">Sin datos</span></div>';
  }
}

// =========================================================
//  TRIO — rota automáticamente cada 4 bloques terminados
//  También se puede cambiar manualmente desde el panel admin
//  (esa función se agrega en el punto de admin)
// =========================================================
function actualizarTrio() {
  // Cada 4 bloques terminados cambia al siguiente trío
  // Ejemplo: 0-3 terminados → TRIO 1, 4-7 → TRIO 2, 8-11 → TRIO 3, etc.
  var indice = Math.floor(bloquesTerminados / 4) % TRIOS.length;
  document.getElementById('trio-nombre').textContent = TRIOS[indice];
}

// =========================================================
//  RENDERIZAR BLOQUE ACTIVO
// =========================================================
function renderizarBloqueActivo() {
  document.getElementById('actual-nombre').textContent    = bloqueActivoActual.nombre;
  document.getElementById('actual-subtitulo').textContent = bloqueActivoActual.subtitulo;
  document.getElementById('actual-chips').innerHTML = bloqueActivoActual.parejas.map(function(num,i){
    return '<div class="pareja-chip" style="animation-delay:'+(i*0.08)+'s">#'+num+'</div>';
  }).join('');
}

// =========================================================
//  RENDERIZAR SIGUIENTES BLOQUES
// =========================================================
function renderizarSiguientes() {
  var grid = document.getElementById('siguientes-grid');
  if (!bloquesSiguientes.length) {
    grid.innerHTML = '<div style="color:rgba(255,255,255,0.4);font-size:0.9rem;grid-column:1/-1;text-align:center;padding:1rem;">No hay más bloques pendientes en este grupo</div>';
    return;
  }
  grid.innerHTML = bloquesSiguientes.map(function(b){
    if (b.placeholder) {
      // Tarjeta placeholder para ronda no generada aún
      return '<div class="bloque-siguiente" style="border-color:rgba(212,160,23,0.3);opacity:0.7;">' +
        '<div class="siguiente-num">'+b.etiqueta+'</div>' +
        '<div class="siguiente-nombre">'+b.nombre+'</div>' +
        '<div class="siguiente-divisor"></div>' +
        '<div class="siguiente-parejas-label" style="color:rgba(255,255,255,0.5);">⏳ Por definir</div>' +
        '<div style="font-size:0.72rem;color:rgba(255,255,255,0.35);line-height:1.4;">'+b.placeholderTexto+'</div>' +
      '</div>';
    }
    // Tarjeta normal
    return '<div class="bloque-siguiente">' +
      '<div class="siguiente-num">'+b.etiqueta+'</div>' +
      '<div class="siguiente-nombre">'+b.nombre+'</div>' +
      '<div class="siguiente-divisor"></div>' +
      '<div class="siguiente-parejas-label">Parejas</div>' +
      '<div class="siguiente-parejas">' +
        (b.parejas.length
          ? b.parejas.map(function(n){return '<span class="siguiente-chip">#'+n+'</span>';}).join('')
          : '<span style="color:rgba(255,255,255,0.35);font-size:0.8rem;">Por definir</span>') +
      '</div>' +
    '</div>';
  }).join('');
}

// =========================================================
//  CAMBIAR BLOQUE CON ANIMACIÓN
// =========================================================
function cambiarBloque(nuevoBloqueData) {
  var contenedor = document.getElementById('bloque-actual');
  contenedor.classList.add('fade-out');
  setTimeout(function(){
    bloqueActivoActual.nombre    = nuevoBloqueData.nombre;
    bloqueActivoActual.subtitulo = nuevoBloqueData.subtitulo;
    bloqueActivoActual.parejas   = nuevoBloqueData.parejas;
    renderizarBloqueActivo();
    contenedor.classList.remove('fade-out');
    contenedor.classList.add('fade-in');
    setTimeout(function(){contenedor.classList.remove('fade-in');},500);
  },400);
}

function iniciarReloj() {

// =========================================================
//  TICKER — mensajes + sponsors
// =========================================================
function iniciarTicker() {
  // Construir el texto del ticker combinando mensajes y sponsors
  var mensajes = MENSAJES_TICKER.slice(); // copia de los mensajes

  // Agregar sponsors con formato especial
  // Si tienes sponsors, aparecen como: "✦ Patrocinado por: SPONSOR 1 ✦"
  if (SPONSORS.length) {
    mensajes.push('✦ Patrocinadores: ' + SPONSORS.join(' · ') + ' ✦');
  }

  var texto  = mensajes.join('      ✦      ');
  var ticker = document.getElementById('ticker');
  // Duplicar para loop continuo
  ticker.innerHTML = '<span>'+texto+'</span><span>'+texto+'</span>';
}
